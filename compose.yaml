services:
  invoker:
    build: .
    env_file: ".env"
    environment:
      token: ${token}
      external_mongo: ${external_mongo}
      internal_mongo: "mongo"
      PYTHONUNBUFFERED: 1
    ports:
      - "8080:5000"
    develop:
      watch:
        - action: sync
          path: .
          target: /
